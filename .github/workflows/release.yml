name: Release

# Builds the .deb inside the mpwsh/n9-build container and attaches it to a
# GitHub Release. Triggered by tag pushes (vX.Y.Z) or manual dispatch.

on:
  push:
    tags: ["v*"]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v, e.g. 1.0.1)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: sensorscope
  BUILD_IMAGE: mpwsh/n9-build:latest

jobs:
  release:
    name: Build & release .deb
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"  >> "$GITHUB_OUTPUT"

      - name: Stamp version into debian/changelog
        # dpkg-buildpackage reads the version from the top changelog entry.
        # Rewrite just the version in the first line; leave the rest alone.
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CHANGELOG="qtc_packaging/debian_harmattan/changelog"
          sed -i "1s/^${APP_NAME} ([^)]*)/${APP_NAME} (${VERSION})/" "${CHANGELOG}"
          echo "=== First line of changelog ==="
          head -1 "${CHANGELOG}"

      - name: Pull build image
        run: docker pull ${{ env.BUILD_IMAGE }}

      - name: Build .deb inside container
        # The n9 script in the image auto-detects /opt/QtSDK and builds
        # locally inside the container. Same script we use on dev machines.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ${{ env.BUILD_IMAGE }} \
            n9 build --path /work

      - name: Locate .deb
        id: deb
        run: |
          DEB_PATH="$(ls build/*.deb 2>/dev/null | head -n1)"
          if [ -z "$DEB_PATH" ]; then
            echo "::error::No .deb produced in build/"
            ls -la build/ || true
            exit 1
          fi
          DEB_NAME="$(basename "$DEB_PATH")"
          DEB_SIZE="$(stat -c%s "$DEB_PATH")"
          echo "path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$DEB_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$DEB_SIZE" >> "$GITHUB_OUTPUT"
          echo "Built: $DEB_NAME ($DEB_SIZE bytes)"

      - name: Inspect .deb
        run: |
          echo "=== Control metadata ==="
          dpkg-deb -I "${{ steps.deb.outputs.path }}"
          echo
          echo "=== Contents ==="
          dpkg-deb -c "${{ steps.deb.outputs.path }}"

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb.outputs.name }}
          path: ${{ steps.deb.outputs.path }}
          if-no-files-found: error

      - name: Create / update GitHub Release with .deb attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.ver.outputs.tag }}
          files: ${{ steps.deb.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Generate installation token for n9-portal
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: mpwsh
          repositories: n9-portal

      - name: Trigger publish in n9-portal
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish.yml
          repo: mpwsh/n9-portal
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          inputs: |
            {
              "deb_url":  "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/${{ steps.deb.outputs.name }}",
              "app_name": "${{ env.APP_NAME }}",
              "version":  "${{ steps.ver.outputs.version }}"
            }
